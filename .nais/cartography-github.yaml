apiVersion: nais.io/v1
kind: Naisjob
metadata:
  name: cartography-github
  namespace: appsec
  labels:
    team: appsec
spec:
  schedule: "0 1 * * 1-5"
  concurrencyPolicy: Forbid
  image: "{{image}}"
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  command:
    - cartography
    - --neo4j-uri
    - bolt://neo4j-bolt.appsec.svc.cluster.local
    - --neo4j-user
    - neo4j
    - --neo4j-password-env-var
    - NEO4J_PASSWORD
    - --selected-modules
    - create-indexes,github
    - --github-config-env-var
    - GITHUB_CONFIG
    - --github-skip-archived-repo-manifests
    - --github-skip-archived-actions-sync
    - --github-skip-archived-commits-sync
    - --github-skip-stale-commits-sync
    - --github-incremental-actions-workflow-sync
    - --github-incremental-dep-manifest-sync
    - --github-parallel-workers
    - "4"
  envFrom:
    - secret: cartography
  env:
    - name: OTEL_LOGS_EXPORTER
      value: otlp
  accessPolicy:
    outbound:
      rules:
        - application: neo4j
      external:
        - host: github.com
        - host: api.github.com
  observability:
    autoInstrumentation:
      enabled: true
      runtime: python
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 3072Mi
