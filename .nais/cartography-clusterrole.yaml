---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cartography-viewer
rules:
  - apiGroups: [""]
    resources:
      - namespaces
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - services
      - serviceaccounts
    verbs: ["list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs: ["list"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cartography-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cartography-viewer
subjects:
  - kind: ServiceAccount
    name: cartography-k8s
    namespace: appsec