name: Build & deploy Neo4j
on:
  workflow_dispatch:

jobs:
  deploy:
    permissions:
      contents: read
      id-token: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: nais/docker-build-push@751a312f0803eb96a05a41fadf51be19b7be362c
        id: docker-push-neo4j
        with:
          team: appsec
          dockerfile: Dockerfile.neo4j
          image_suffix: neo4j
      - uses: nais/deploy/actions/deploy@fceb26518aacf0ca378decec413782d1c5926e1a # ratchet:nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/neo4j.yaml
          IMAGE: ${{ steps.docker-push-neo4j.outputs.image }}
