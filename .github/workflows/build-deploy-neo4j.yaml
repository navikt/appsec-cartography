name: Build & deploy Neo4j
on:
  workflow_dispatch:

jobs:
  deploy:
    permissions:
      contents: read
      id-token: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: nais/docker-build-push@f8bc7437f7549c2b08197152d781b98f8727a08a
        id: docker-push-neo4j
        with:
          team: appsec
          dockerfile: Dockerfile.neo4j
          image_suffix: neo4j
      - uses: nais/deploy/actions/deploy@fceb26518aacf0ca378decec413782d1c5926e1a # ratchet:nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/neo4j.yaml
          IMAGE: ${{ steps.docker-push-neo4j.outputs.image }}
