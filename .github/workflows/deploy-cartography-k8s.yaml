name: Deploy cartography (K8s)
on:
  workflow_dispatch:
   inputs:
     image:
       type: string
       required: true
       description: 'Image to deploy'

jobs:
  deploy:
    permissions:
      contents: read
      id-token: write
      actions: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cluster: dev-fss
            schedule: "0 1 * * *"
          - cluster: dev-gcp
            schedule: "0 2 * * *"
          - cluster: prod-fss
            schedule: "0 3 * * *"
          - cluster: prod-gcp
            schedule: "0 4 * * *"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: nais/deploy/actions/deploy@fceb26518aacf0ca378decec413782d1c5926e1a # ratchet:nais/deploy/actions/deploy@v2
        env:
          CLUSTER: ${{ matrix.cluster }}
          RESOURCE: .nais/cartography-k8s.yaml
          IMAGE: ${{ inputs.image }}
          VAR: cluster=${{ matrix.cluster }},schedule=${{ matrix.schedule }}
