name: Deploy cartography (K8s)
on:
  workflow_dispatch:
   inputs:
     image:
       type: string
       required: true
       description: 'Image to deploy'

jobs:
  deploy:
    permissions:
      contents: read
      id-token: write
      actions: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cluster: dev-fss
            schedule: "0 1,17 * * *"
            neo4jApp: bolt-proxy-outbound
            hostname: "svc.nais.local"
          - cluster: dev-gcp
            schedule: "0 2,18 * * *"
            neo4jApp: bolt-proxy-outbound
            hostname: "svc.cluster.local"
          - cluster: prod-fss
            schedule: "0 3,19 * * *"
            neo4jApp: bolt-proxy-outbound
            hostname: "svc.nais.local"
          - cluster: prod-gcp
            schedule: "0 4,20 * * *"
            neo4jApp: neo4j
            hostname: "svc.cluster.local"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # ratchet:nais/deploy/actions/deploy@v2
        env:
          CLUSTER: ${{ matrix.cluster }}
          RESOURCE: .nais/cartography-k8s.yaml
          IMAGE: ${{ inputs.image }}
          VAR: cluster=${{ matrix.cluster }},schedule=${{ matrix.schedule }},neo4jApp=${{ matrix.neo4jApp }},hostname=${{ matrix.hostname }}
